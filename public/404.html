<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>MoveSmart</title>
    <script>
      var repo = '/MoveSmart';
      var path = window.location.pathname.replace(repo, '');
      var search = window.location.search;
      var hash = window.location.hash;
      var redirect = repo + '/?path=' + encodeURIComponent(path + search + hash);
      window.location.replace(redirect);
    </script>
  </head>
  <body></body>
</html>
